name: Build GitDash

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.config.name }})
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
            target: Win64

          - name: macOS
            os: macos-latest
            target: MacOS

          - name: Android32
            os: ubuntu-latest
            target: Android32

          - name: Android64
            os: ubuntu-latest
            target: Android64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── DIAGNOSTIC: expand this step in Actions to see what's on disk ──
      - name: Verify files on disk
        shell: bash
        run: |
          echo "GITHUB_WORKSPACE = $GITHUB_WORKSPACE"
          echo "PWD              = $(pwd)"
          echo ""
          echo "── Root listing ──"
          ls -la
          echo ""
          echo "── CMakeLists.txt check ──"
          if [ -f "CMakeLists.txt" ]; then
            echo "✅ CMakeLists.txt EXISTS"
            head -5 CMakeLists.txt
          else
            echo "❌ CMakeLists.txt MISSING"
            echo "All files found recursively:"
            find . -name "CMakeLists.txt" 2>/dev/null || echo "(none found anywhere)"
          fi

      - name: Build mod
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: v4.4.0
          target: ${{ matrix.config.target }}
          export-pdb: true

  package:
    name: Package .geode file
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package mod
        uses: geode-sdk/build-geode-mod/package@main
        with:
          build-output: .
          sdk: v4.4.0

      - name: Upload .geode artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitDash.geode
          path: "*.geode"
          if-no-files-found: error
          retention-days: 30