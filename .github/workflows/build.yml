name: Build GitDash

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.config.name }})
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
            target: Win64

          - name: macOS
            os: macos-latest
            target: MacOS

          - name: Android32
            os: ubuntu-latest
            target: Android32

          - name: Android64
            os: ubuntu-latest
            target: Android64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Debug: confirm CMakeLists.txt is present before building
      # (Remove this step once builds are passing)
      - name: List workspace files (debug)
        shell: bash
        run: |
          echo "=== Workspace root ==="
          ls -la ${{ github.workspace }}
          echo ""
          echo "=== src/ directory ==="
          ls -la ${{ github.workspace }}/src || echo "src/ not found!"
          echo ""
          echo "=== CMakeLists.txt check ==="
          test -f ${{ github.workspace }}/CMakeLists.txt && echo "CMakeLists.txt EXISTS" || echo "CMakeLists.txt MISSING"
          test -f ${{ github.workspace }}/mod.json      && echo "mod.json EXISTS"      || echo "mod.json MISSING"

      - name: Build mod
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: v4.4.0
          target: ${{ matrix.config.target }}
          # Explicitly tell the action where your source is
          # so it doesn't try to guess from a wrong working directory
          build-dir: ${{ github.workspace }}/build
          export-pdb: true

  package:
    name: Package .geode file
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package mod
        uses: geode-sdk/build-geode-mod/package@main
        with:
          build-output: .
          sdk: v4.4.0

      - name: Upload .geode artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitDash.geode
          path: "*.geode"
          if-no-files-found: error
          retention-days: 30