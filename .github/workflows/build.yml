name: Build GitDash

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.config.name }})
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
            target: Win64

          - name: Android32
            os: ubuntu-latest
            target: Android32

          - name: Android64
            os: ubuntu-latest
            target: Android64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build mod
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: nightly
          target: ${{ matrix.config.target }}
          export-pdb: true

  package:
    name: Package .geode file
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package mod
        uses: geode-sdk/build-geode-mod/package@main
        with:
          build-output: .
          sdk: nightly

      - name: Upload .geode artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitDash.geode
          path: "*.geode"
          if-no-files-found: error
          retention-days: 30
