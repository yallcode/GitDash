name: Build GitDash

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  # Also allow triggering manually from the Actions tab
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # BUILD — compiles the mod for each platform in parallel
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.config.name }})
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false   # Don't cancel other platforms if one fails
      matrix:
        config:
          - name: Windows
            os: windows-latest
            target: win

          - name: macOS
            os: macos-latest
            target: mac

          - name: Android32
            os: ubuntu-latest
            target: android32

          - name: Android64
            os: ubuntu-latest
            target: android64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # The official Geode build action.
      # It handles: SDK download, toolchain setup (MSVC/NDK/Clang),
      # CMake configure, and compilation.
      # FIX: Pinned to @v3 — do NOT use @main, it is unstable and broke --platform passing
      - name: Build mod
        uses: geode-sdk/build-geode-mod@v3
        with:
          sdk: v4.4.0
          target: ${{ matrix.config.target }}
          export-pdb: true

  # ─────────────────────────────────────────────────────────────────────────
  # PACKAGE — bundles all platform binaries into a single .geode file
  # Only runs after ALL platform builds succeed
  # ─────────────────────────────────────────────────────────────────────────
  package:
    name: Package .geode file
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # FIX: Also pinned to @v3
      - name: Package mod
        uses: geode-sdk/build-geode-mod/package@v3
        with:
          build-output: .
          sdk: v4.4.0

      # Upload the final .geode file as a downloadable workflow artifact.
      # Find it under: Actions tab → your workflow run → Artifacts section.
      - name: Upload .geode artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitDash.geode
          # The package step produces a file named after your mod id
          path: "*.geode"
          if-no-files-found: error
          retention-days: 30