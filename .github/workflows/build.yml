name: Build GitDash

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.config.name }})
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          # !! IMPORTANT: target must be EXACT capitalized strings.
          # "win" / "mac" / "android64" are WRONG — they silently break
          # internal platform detection and cause the --platform error.
          # Valid values: Win64 | MacOS | Android32 | Android64
          - name: Windows
            os: windows-latest
            target: Win64

          - name: macOS
            os: macos-latest
            target: MacOS

          - name: Android32
            os: ubuntu-latest
            target: Android32

          - name: Android64
            os: ubuntu-latest
            target: Android64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # build-geode-mod has NO release tags at all — @main is the ONLY valid ref.
      # @v3 does not exist. The root cause of ALL previous errors was lowercase
      # target values ("win", "mac", "android64"). The capitalized targets above fix
      # the "--platform <PLATFORM> but none was supplied" error.
      - name: Build mod
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: v4.4.0
          target: ${{ matrix.config.target }}
          export-pdb: true

  package:
    name: Package .geode file
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package mod
        uses: geode-sdk/build-geode-mod/package@main
        with:
          build-output: .
          sdk: v4.4.0

      - name: Upload .geode artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitDash.geode
          path: "*.geode"
          if-no-files-found: error
          retention-days: 30