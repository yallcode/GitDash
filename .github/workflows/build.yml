name: Build GitDash

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.config.name }})
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
            target: Win64

          - name: Android32
            os: ubuntu-latest
            target: Android32

          - name: Android64
            os: ubuntu-latest
            target: Android64

          - name: iOS
            os: macos-latest
            target: iOS

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build mod
        uses: geode-sdk/build-geode-mod@main
        id: build
        with:
          sdk: v5.6.1
          target: ${{ matrix.config.target }}
          combine: true
          ccache-variant: ""

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitDash-${{ matrix.config.name }}
          path: ${{ steps.build.outputs.build-output }}

  package:
    name: Package .geode file
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Merge platform builds
        uses: geode-sdk/build-geode-mod/combine@main
        id: combine

      - name: Upload final .geode
        uses: actions/upload-artifact@v4
        with:
          name: GitDash.geode
          path: ${{ steps.combine.outputs.build-output }}